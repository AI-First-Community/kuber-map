name: gate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    name: quality gate (ruff + pytest + validate + attribution)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Set up venv + dev deps
        run: make setup
      - name: Run the gate
        run: make check
